version: "3.8"

services:
  engram:
    image: alpine:3.19
    container_name: engram-server
    restart: unless-stopped
    ports:
      - "7437:7437"
    volumes:
      - engram-data:/data
    environment:
      - ENGRAM_DATA_DIR=/data
      - ENGRAM_PORT=7437
    entrypoint: /bin/sh
    command:
      - -c
      - |
        wget -qO- https://github.com/Gentleman-Programming/engram/releases/download/v1.10.4/engram_1.10.4_linux_amd64.tar.gz | tar xz -C /usr/local/bin/ engram && \
        engram serve 7437
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7437/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  engram-data:
